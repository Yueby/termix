<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#24283b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="16" y="16" width="480" height="480" rx="96" stroke="url(#accent)" stroke-width="3" stroke-opacity="0.3" fill="none"/>

  <!-- Terminal prompt: > -->
  <path d="M 128 192 L 224 264 L 128 336" stroke="url(#accent)" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cursor line -->
  <line x1="260" y1="320" x2="384" y2="320" stroke="#a9b1d6" stroke-width="36" stroke-linecap="round" opacity="0.7"/>
</svg>
