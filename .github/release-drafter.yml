name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: "New Features"
    labels:
      - feature
      - enhancement
  - title: "Bug Fixes"
    labels:
      - fix
      - bugfix
      - bug
  - title: "UI / UX"
    labels:
      - ui
      - ux
      - design
  - title: "Performance"
    labels:
      - performance
  - title: "Documentation"
    labels:
      - documentation
      - docs
  - title: "Dependencies"
    labels:
      - dependencies
      - deps
  - title: "Other Changes"
    labels:
      - "*"

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'
no-changes-template: "- No changes"

version-resolver:
  major:
    labels:
      - major
      - breaking
  minor:
    labels:
      - minor
      - feature
      - enhancement
  patch:
    labels:
      - patch
      - fix
      - bugfix
  default: patch

autolabeler:
  - label: feature
    title:
      - "/^feat/i"
  - label: fix
    title:
      - "/^fix/i"
  - label: ui
    title:
      - "/^ui/i"
      - "/^style/i"
  - label: documentation
    title:
      - "/^docs/i"
  - label: dependencies
    title:
      - "/^deps/i"
      - "/^chore\\(deps\\)/i"
  - label: performance
    title:
      - "/^perf/i"
